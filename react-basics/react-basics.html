<!DOCTYPE html>
<html>,
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>
    
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- Babel is a external Library that is used to convert the React language to readable JavaScript format so we use that Babel. -->
    
    <script type="text/babel">
      const button = <button>Hello</button> //JSX format
      const paragraph = <p>paragraph os text</p>;
      const container = document.querySelector('.js-container');
      const div = (
        <div>
          <button>Hello</button>
          <p>paragraph os text</p>
        </div>
      );
      ReactDOM.createRoot(container).render(div);
    </script>
  </body>
</html>
