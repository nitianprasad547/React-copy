<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <link href="output.css" rel="stylesheet">
  </head>
  <body class="font-serif text-2.5 overflow-hidden">
    <div class="js-container"></div>
    
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- Babel is a external Library that is used to convert the React language to readable JavaScript format so we use that Babel. -->
    
    <script type="text/babel">
        function ChatInput({chatMessages, setChatMessages}){
            const [inputText , setInputText] = React.useState('');
            const [isLoading , setIsLoading] = React.useState(false);
            function saveInputText(event){
                setInputText(event.target.value);
            }
            
            async function sendMessage(){
                if (isLoading || inputText===''){
                    return;
                }
                setIsLoading(true)
                setInputText('');
                const newChatMessages =[
                        ...chatMessages,
                        {
                            message : inputText,
                            sender : 'user',
                            id : crypto.randomUUID()
                        }
                    ]
                    setChatMessages([
                        ...newChatMessages,
                        {
                            message : 'Loading...',
                            sender : 'robot',
                            id : crypto.randomUUID()
                        }
                    ]);
                //When we used for resopnse then when we give input that was not seen in the page because we give an empty sring below so the previous code not shown us.We will store that in a variable.
                const response = await Chatbot.getResponseAsync(inputText);
                setChatMessages([
                    ...newChatMessages,
                    {
                        message : response,
                        sender : 'robot',
                        id : crypto.randomUUID()
                    }
                ]);
                setIsLoading(false);
            }
            
            function enter(event){
                if((event.key)==='Enter'){
                    sendMessage()
                }
                else if(event.key === 'Escape'){
                    setInputText('')
                }
             }
            return(
                <div className="flex mb-12.5">
                    <input 
                    placeholder="Send a message to Chatbot" 
                    size="30" 
                    onChange = {saveInputText}
                    value = {inputText}
                    onKeyDown = {enter}
                    className="border-2 px-4 py-3 rounded-xl grow"
                    />
                    <button 
                        onClick={sendMessage}
                        className="bg-emerald-700 border-0 px-5 py-3.5 text-amber-50 rounded-xl ml-2 cursor-pointer"
                    >Send</button>    
                </div>
            );
        }

        function ChatMessage(props){
            //const message = props.message;
            //const sender = props.sender;
            const {message , sender } = props;
            /*if(sender === 'robot'){
                return(
                    <div>
                        <img src="robot.png" width="40"/>
                        {message}
                    </div>
                );
                }*/
                return(
                    <div className=
                        {sender ==='user' ? 
                        "flex justify-end items-start" : 
                        "flex items-start"}>
                        {sender === 'robot' && <img className="rounded-2xl border-2 w-12.5" src="robot.png"/>}
                        <div className="bg-gray-200 py-3.75 px-5 rounded-xl mx-2.5 mb-5 max-w-75">
                            {message}
                        </div>
                        {sender === 'user' && <img className="rounded-2xl border-2 w-12.5"  src="cat.png"/>}  
                    </div> 
                );
            }
        function ChatMessages({chatMessages}){
            const chatMessagesref = React.useRef(null);
            React.useEffect(()=>{
                const containerElem = chatMessagesref.current;
                if(containerElem){
                    containerElem.scrollTop = containerElem.scrollHeight;
                }
            },[chatMessages]);
            
            return(
            <div ref={chatMessagesref} className="grow mt-5 overflow-scroll scrollbar-none">
                {chatMessages.map((chatMessage)=>{
                return(
                    <ChatMessage 
                    message={chatMessage.message} sender={chatMessage.sender} key={chatMessage.id} />   
                )
            })}
            </div>
            );
        };
        
        function App(){
            const array = React.useState(
                [
                {
                    message :'Hello Chatbot',
                    sender : 'user',
                    id : 'id1'
                },
                {
                    message : 'Hello! How can I help You?',
                    sender : 'robot',
                    id : 'id2'
                },
                {
                    message : 'can you get me today\'s date?',
                    sender : 'user',
                    id : 'id3'
                },
                {
                    message : 'Today is September 27',
                    sender : 'robot',
                    id : 'id4'
                }
            ]
            )
            //shortcut notation of below lines
            const [chatMessages , setChatMessages] = array;
            // const chatMessages = array[0];
            // const setChatMessages = array[1];//This the function(Updater function)
            //First value will be the current data that is given to the user.
            
            // ... is a operator that creates a copy of a function.
            return(
                <div className="max-w-150 ml-auto mr-auto h-screen flex flex-col">
                <ChatMessages
                    chatMessages={chatMessages}
                />
                <ChatInput 
                    chatMessages={chatMessages}
                    setChatMessages={setChatMessages}
                />
                </div>
            )
        };

      const app = <App/>
      //that ChatInput written inside can be written in {ChatInput} this format also .
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(app);
    </script>
  </body>
</html>
