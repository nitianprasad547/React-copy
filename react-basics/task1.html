<!DOCTYPE html>
<html>,
  <head>
    <title>Task1</title>
  </head>
  <body>
    <div class="js-container"></div>
    
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
    <!-- Babel is a external Library that is used to convert the React language to readable JavaScript format so we use that Babel. -->
    
    <script type="text/babel">
        const container = document.querySelector('.js-container');
        const button = <button>Good Job !</button>;
        const paragraph = <p>My name is Prasad</p>;
        const productCost = 10 + (2*8);
        const shipingCost = Number(5);
        const today = dayjs().format('MMMM D');
        let time = dayjs().format ('HH : mm : ss');
        console.log(today);
        const div1 = (
            <div>
                <p>Cotton socks</p>
                <p>Price : $10</p>
                <button>Add to Cart</button>
                <p>Product Cost : ${productCost}</p>
                <p>Shipping Cost : ${shipingCost}</p>
                <p>Total cost : ${productCost+shipingCost}</p>
            </div>
        );
        const date = <p>Today is {today}</p>
        const timeP = <p>Current Time : {time}</p>
        
        const root = ReactDOM.createRoot(container);
        setInterval(() =>{
            const currentTime = dayjs().format ('HH : mm : ss');
            root.render(<p>Current Time : {currentTime}</p>);
        },1000);
        
    </script>
  </body>
</html>
