        function App(){
            const [counter , setCounter] = React.useState(0);
            const buttonRef = React.useRef(null);
            const intervalRef = React.useRef(null);
            const [isClicked, setIsClicked] = React.useState(true)
            function increaseCount(){
                setCounter(counter+1);
            }
            function reset(){
                setCounter(0);
            }
            function autoCount(){
                if(isClicked){
                    intervalRef.current= setInterval(()=>{
                    const buttonElem = buttonRef.current;
                    if(buttonElem){
                        buttonElem.click();
                    }
                },1000);
                }
                else{
                    clearInterval(intervalRef.current);
                }
                setIsClicked(!isClicked);
            }
            return(
                <div className="h-screen flex justify-center text-amber-50 items-center gap-3">
                    <button 
                    onClick={increaseCount}
                    ref={buttonRef}
                    className="border bg-[rgb(25,135,84)] px-4 py-3 rounded-xl"
                    >Clicked {counter} Times</button>
                    <button className="border bg-[rgb(25,135,84)] px-4 py-3 rounded-xl" onClick={reset}>Reset</button>
                    <button className="border bg-[rgb(25,135,84)] px-4 py-3 rounded-xl" onClick={autoCount}>Auto Click</button>  
                </div>
            )
        }
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
